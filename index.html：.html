

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语四六级单词速记游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>英语四六级单词速记游戏</h1>
        <div class="game-info">
            <div class="timer">时间: <span id="time">60</span>秒</div>
            <div class="score">得分: <span id="score">0</span></div>
            <div class="level">等级: <span id="level">1</span></div>
        </div>
        <div class="word-container">
            <div id="word">点击开始</div>
            <div class="options" id="options"></div>
        </div>
        <div class="controls">
            <button id="start-btn">开始游戏</button>
            <button id="pause-btn" disabled>暂停</button>
            <button id="reset-btn" disabled>重置</button>
        </div>
        <div class="game-over" id="game-over">
            <h2>游戏结束</h2>
            <p>最终得分: <span id="final-score"></span></p>
            <p>最高等级: <span id="final-level"></span></p>
            <button id="restart-btn">重新开始</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
